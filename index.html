@keyframes lastAlertShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

.alert-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);z-index:99900;display:flex;align-items:center;justify-content:center}
.alert-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(88vw,360px);border-radius:22px;background:var(--n2);z-index:99901;animation:alertPop .35s cubic-bezier(.32,.72,0,1) forwards;padding:28px 22px 22px;text-align:center}
.alert-popup.tipo-camino{border:2.5px solid var(--or);animation:alertPop .35s cubic-bezier(.32,.72,0,1) forwards, alertPulse 1.5s ease 0.4s 4}

<body>
<div id="root"></div>
<div id="modal-portal"></div>
<script>
"use strict";
var h=React.createElement,us=React.useState,ue=React.useEffect;
var ur=React.useRef;
var PORTAL=document.getElementById("modal-portal");
function Modal(p){return ReactDOM.createPortal(p.children,PORTAL)}

/* ══════════════════════════════════════════════
   🔊 MOTOR DE SONIDO v4 — INDESTRUCTIBLE
   Genera WAV inline como data:URI base64
   Cada botón reproduce directamente (user-gesture)
   Pool pre-desbloqueada para notificaciones RT
   ══════════════════════════════════════════════ */
window._audioOK=false;
window._audioCtx=null;
window._soundPool={};
window._soundURIs={};

/* ── Generar WAV PCM mono 22050Hz desde frecuencias ── */
function _mkWav(notas,durSec){
  var sr=22050,len=Math.ceil(sr*(durSec||0.9)),buf=new Float32Array(len);
  notas.forEach(function(n){
    var freq=n[0],startS=Math.floor(n[1]*sr),dur=Math.floor(0.17*sr);
    for(var i=0;i<dur&&(startS+i)<len;i++){
      var t=i/sr;
      var env=i<dur*0.08?i/(dur*0.08):i>dur*0.65?1-(i-dur*0.65)/(dur*0.35):1;
      buf[startS+i]+=Math.sin(2*Math.PI*freq*t)*0.45*env;
    }
  });
  for(var i=0;i<len;i++){buf[i]=Math.max(-1,Math.min(1,buf[i]))}
  var hdrSz=44,dataSz=len*2,wavSz=hdrSz+dataSz;
  var ab=new ArrayBuffer(wavSz),v=new DataView(ab);
  function ws(o,s){for(var j=0;j<s.length;j++)v.setUint8(o+j,s.charCodeAt(j))}
  ws(0,"RIFF");v.setUint32(4,wavSz-8,true);ws(8,"WAVE");ws(12,"fmt ");
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);
  v.setUint16(34,16,true);ws(36,"data");v.setUint32(40,dataSz,true);
  for(var i=0;i<len;i++){v.setInt16(hdrSz+i*2,Math.floor(buf[i]*32767),true)}
  /* Convertir a base64 data URI */
  var bytes=new Uint8Array(ab),bin="";
  for(var i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
  return "data:audio/wav;base64,"+btoa(bin);
}

/* Melodías por tipo de evento */
var _MELS={
  en_camino:  {n:[[440,0],[523,0.18],[440,0.34],[587,0.50],[440,0.66]],d:0.9},
  en_puerta:  {n:[[523,0],[659,0.14],[784,0.28],[659,0.42],[880,0.56]],d:0.8},
  entregado:  {n:[[523,0],[659,0.14],[784,0.26],[1047,0.38]],d:0.6},
  ausencia_hoy:{n:[[400,0],[330,0.20],[400,0.40]],d:0.6},
  ausencia_programada:{n:[[400,0],[330,0.20],[400,0.40]],d:0.6},
  cancelar_ausencia:{n:[[440,0],[523,0.14],[659,0.28]],d:0.5},
  confirm:    {n:[[880,0],[1100,0.1]],d:0.25}
};

/* Pre-generar todos los WAVs como data URIs al inicio */
(function(){
  Object.keys(_MELS).forEach(function(k){
    window._soundURIs[k]=_mkWav(_MELS[k].n,_MELS[k].d);
  });
})();

/* ── Desbloquear audio: crear pool de Audio pre-cargados ── */
function _desbloquearAudio(){
  if(window._audioOK)return true;
  try{
    /* Crear un Audio por cada tipo y hacer .load() */
    Object.keys(window._soundURIs).forEach(function(k){
      var a=new Audio(window._soundURIs[k]);
      a.preload="auto";a.volume=0.8;a.load();
      window._soundPool[k]=a;
    });
    /* También desbloquear AudioContext como backup */
    try{
      var C=window.AudioContext||window.webkitAudioContext;
      if(C){
        window._audioCtx=new C();
        if(window._audioCtx.state==="suspended")window._audioCtx.resume();
        var b=window._audioCtx.createBuffer(1,1,22050);
        var s=window._audioCtx.createBufferSource();
        s.buffer=b;s.connect(window._audioCtx.destination);s.start(0);
      }
    }catch(e2){}
    window._audioOK=true;
    return true;
  }catch(e){return false}
}

/* ── Auto-desbloqueo en CUALQUIER toque ── */
function _autoUnlock(){
  if(window._audioOK)return;
  _desbloquearAudio();
  if(window._audioOK){
    document.removeEventListener("touchstart",_autoUnlock,true);
    document.removeEventListener("touchend",_autoUnlock,true);
    document.removeEventListener("click",_autoUnlock,true);
  }
}
document.addEventListener("touchstart",_autoUnlock,{capture:true,passive:true});
document.addEventListener("touchend",_autoUnlock,{capture:true,passive:true});
document.addEventListener("click",_autoUnlock,{capture:true,passive:true});

/* ══════════════════════════════════════════════
   🔊 playHorn — FUNCIÓN PRINCIPAL DE SONIDO
   Intenta 3 métodos en cascada:
   1) new Audio() directo (funciona en user gesture)
   2) Pool pre-cargada (funciona para RT)
   3) AudioContext oscilador (fallback)
   + Vibración siempre
   ══════════════════════════════════════════════ */
function playHorn(tipo){
  tipo=tipo||"en_camino";
  /* 1. Vibración — siempre funciona sin permiso */
  try{
    if(navigator.vibrate){
      if(tipo==="en_puerta")navigator.vibrate([300,100,300,100,500]);
      else if(tipo==="entregado")navigator.vibrate([150,80,150,80,400]);
      else navigator.vibrate([200,80,200]);
    }
  }catch(e){}

  var uri=window._soundURIs[tipo]||window._soundURIs.en_camino;
  var played=false;

  /* 2. new Audio directo — funciona si estamos en user gesture */
  try{
    var a=new Audio(uri);a.volume=0.85;
    var p=a.play();
    if(p&&p.then)p.then(function(){played=true}).catch(function(){});
    else played=true;
  }catch(e){}

  /* 3. Pool pre-cargada — funciona para notificaciones RT */
  if(window._soundPool[tipo]){
    try{
      var poolA=window._soundPool[tipo];
      poolA.currentTime=0;poolA.volume=0.85;
      var p2=poolA.play();
      if(p2&&p2.catch)p2.catch(function(){});
    }catch(e){}
  }

  /* 4. AudioContext como último recurso */
  if(window._audioCtx&&window._audioOK){
    try{
      var ctx=window._audioCtx;
      if(ctx.state==="suspended")ctx.resume();
      var mel=(_MELS[tipo]||_MELS.en_camino).n;
      var now=ctx.currentTime;
      mel.forEach(function(n){
        var osc=ctx.createOscillator(),gn=ctx.createGain();
        osc.type="triangle";osc.frequency.value=n[0];
        gn.gain.setValueAtTime(0,now+n[1]);
        gn.gain.linearRampToValueAtTime(0.35,now+n[1]+0.02);
        gn.gain.setValueAtTime(0.35,now+n[1]+0.10);
        gn.gain.linearRampToValueAtTime(0,now+n[1]+0.16);
        osc.connect(gn);gn.connect(ctx.destination);
        osc.start(now+n[1]);osc.stop(now+n[1]+0.20);
      });
    }catch(e){}
  }
}

/* ── Banner: visible hasta que se toque ── */
function AudioBanner(){
  var _v=us(!window._audioOK),vis=_v[0],sVis=_v[1];
  ue(function(){
    if(window._audioOK){sVis(false);return}
    /* Auto-ocultar cuando se desbloquee por otra vía */
    var iv=setInterval(function(){if(window._audioOK)sVis(false)},1000);
    return function(){clearInterval(iv)};
  },[]);
  if(!vis)return null;
  function activar(e){
    if(e&&e.preventDefault)e.preventDefault();
    _desbloquearAudio();
    sVis(false);
    playHorn("confirm");
  }
  return h("div",{onClick:activar,onTouchEnd:activar,style:{
    position:"fixed",top:0,left:0,right:0,zIndex:99998,
    background:"linear-gradient(90deg,#f97316,#ea580c)",
    padding:"14px 20px",paddingTop:"calc(14px + env(safe-area-inset-top,0px))",
    display:"flex",alignItems:"center",gap:12,cursor:"pointer",
    boxShadow:"0 4px 20px rgba(0,0,0,.5)"}},
    h("span",{style:{fontSize:28,animation:"bellRing .8s ease infinite"}},"🔔"),
    h("div",{style:{flex:1}},
      h("div",{style:{fontSize:15,fontWeight:800,color:"#fff"}},"TOCA AQUÍ para activar sonidos"),
      h("div",{style:{fontSize:11,color:"rgba(255,255,255,.9)",marginTop:2}},"Un solo toque activa las alertas sonoras")),
    h("div",{style:{fontSize:22,color:"#fff",fontWeight:700}},"▶"));
}

/* ══════════════════════════════════════════════
   📡 GPS UNIFICADO — Un solo sistema para toda la app
   Se inicia desde Ruta, se ve en GPS y en Portal Apoderado
   ══════════════════════════════════════════════ */
window._gps={active:false,van:null,watchId:null,lastLat:null,lastLng:null,lastAcc:null,error:null,listeners:[]};

function gpsStart(van){
  if(window._gps.active&&window._gps.van===van)return; /* ya transmitiendo este */
  gpsStop(); /* detener anterior si hay */
  if(!navigator.geolocation)return;
  window._gps.van=van;window._gps.active=true;window._gps.error=null;
  window._gps.watchId=navigator.geolocation.watchPosition(
    function(pos){
      var lat=pos.coords.latitude,lng=pos.coords.longitude,acc=Math.round(pos.coords.accuracy);
      window._gps.lastLat=lat;window._gps.lastLng=lng;window._gps.lastAcc=acc;window._gps.error=null;
      sb.from("ubicaciones_furgones").upsert(
        {furgon_id:van,latitud:lat,longitud:lng,ultima_actualizacion:new Date().toISOString()},
        {onConflict:"furgon_id"}
      ).then(function(r){
        if(r.error){
          window._gps.error="Error BD: "+r.error.message;
          console.error("GPS upsert error:",r.error);
        }
        window._gps.listeners.forEach(function(fn){try{fn()}catch(e){}});
      }).catch(function(e){
        window._gps.error="Error red: "+e.message;
        window._gps.listeners.forEach(function(fn){try{fn()}catch(e2){}});
      });
    },
    function(e){
      window._gps.error=e.code===1?"Permiso GPS denegado":"Error GPS ("+e.code+")";
      window._gps.active=false;window._gps.watchId=null;
      window._gps.listeners.forEach(function(fn){try{fn()}catch(e2){}});
    },
    {enableHighAccuracy:true,maximumAge:2000,timeout:20000}
  );
}
function gpsStop(){
  if(window._gps.watchId!==null){navigator.geolocation.clearWatch(window._gps.watchId)}
  window._gps.active=false;window._gps.van=null;window._gps.watchId=null;window._gps.error=null;
  window._gps.listeners.forEach(function(fn){try{fn()}catch(e){}});
}
/* Hook para que componentes React se suscriban a cambios GPS */
function useGps(){
  var _u=us(0),forceUpdate=_u[1];
  ue(function(){
    function cb(){forceUpdate(function(n){return n+1})}
    window._gps.listeners.push(cb);
    return function(){window._gps.listeners=window._gps.listeners.filter(function(f){return f!==cb})};
  },[]);
  return window._gps;
}

/* ══════════════════════════════════════════════
   🔔 ALERT POPUP COMPONENT
   Shows a full-screen popup for incoming notifications
   ══════════════════════════════════════════════ */
var _alertQueue=[];
var _alertShowing=false;
var _alertSetter=null; /* Will be set by App */

function AlertPopup(p){
  var al=p.alert,onClose=p.onClose;
  if(!al)return null;
  var cfg={
    en_camino:{icon:"🚐",title:"¡Furgón en camino!",color:"var(--or)",tipo:"tipo-camino",btnBg:"var(--or)",btnColor:"var(--ny)"},
