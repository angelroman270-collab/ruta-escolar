<script>
/* ═══════════════════════════════════════════════════════
   MANIFEST DINÁMICO — CRÍTICO para PWA con código apoderado
   ─ Android Chrome: genera blob manifest con ?p=CODIGO
   ─ iOS Safari: guarda en localStorage, lee al abrir PWA
   ─ Ambos sistemas garantizan que la PWA instalada abre
     portal.html con el código correcto, nunca index.html
   ═══════════════════════════════════════════════════════ */
(function(){
  var url=window.location.href;
  var pc=new URLSearchParams(window.location.search).get("p");
  
  /* SIEMPRE guardar el código en localStorage cuando viene en URL */
  if(pc){
    try{localStorage.setItem("ruta_pc",pc);}catch(e){}
  }

  /* Generar manifest dinámico con start_url que incluye ?p=CODIGO */
  /* Esto hace que Android Chrome instale la PWA con el código correcto */
  var startUrl="/portal.html"+(pc?"?p="+pc:"");
  var manifest={
    name:"Mi Furgón · RutaEscolar",
    short_name:"Mi Furgón",
    description:"Portal de transporte escolar para apoderados",
    start_url:startUrl,
    scope:"/",
    display:"standalone",
    orientation:"portrait",
    background_color:"#0a1628",
    theme_color:"#0a1628",
    icons:[
      {src:"/icon-192.jpg",sizes:"192x192",type:"image/jpeg",purpose:"any maskable"},
      {src:"/icon-512.jpg",sizes:"512x512",type:"image/jpeg",purpose:"any maskable"}
    ]
  };
  try{
    var blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
    var blobUrl=URL.createObjectURL(blob);
    document.getElementById("pwa-manifest").href=blobUrl;
  }catch(e){}
})();
</script>

<script>
"use strict";

/* ═══════════════════════════════════════════════
   📍 CÓDIGO DEL APODERADO
   Lee desde URL (?p=) o localStorage (PWA sin URL)
   ═══════════════════════════════════════════════ */
var PC=(function(){
  var fromUrl=new URLSearchParams(window.location.search).get("p");
  if(fromUrl){try{localStorage.setItem("ruta_pc",fromUrl)}catch(e){}return fromUrl;}
  try{return localStorage.getItem("ruta_pc")||null}catch(e){return null}
})();

/* ═══════════════════════════════════════════════
   🔊 SISTEMA DE AUDIO
   Auto-activación a los 2s + click simulado
   iOS/Android: pool de Audio + WebAudio API
   ═══════════════════════════════════════════════ */
window._audioOK=false;
window._audioCtx=null;
window._soundPool={};
window._soundURIs={};

/* Generar tonos WAV en base64 */
function _mkWav(notas,durSec){
  var sr=22050,len=Math.ceil(sr*(durSec||0.9)),buf=new Float32Array(len);
  notas.forEach(function(n){
    var freq=n[0],startS=Math.floor(n[1]*sr),dur=Math.floor(0.17*sr);
    for(var i=0;i<dur&&(startS+i)<len;i++){
      var t=i/sr,env=i<dur*0.08?i/(dur*0.08):i>dur*0.65?1-(i-dur*0.65)/(dur*0.35):1;
      buf[startS+i]+=Math.sin(2*Math.PI*freq*t)*0.45*env;
    }
  });
  for(var i=0;i<len;i++)buf[i]=Math.max(-1,Math.min(1,buf[i]));
  var hdrSz=44,dataSz=len*2,wavSz=hdrSz+dataSz,ab=new ArrayBuffer(wavSz),v=new DataView(ab);
  function ws(o,s){for(var j=0;j<s.length;j++)v.setUint8(o+j,s.charCodeAt(j))}
  ws(0,"RIFF");v.setUint32(4,wavSz-8,true);ws(8,"WAVE");ws(12,"fmt ");
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);
  v.setUint16(34,16,true);ws(36,"data");v.setUint32(40,dataSz,true);
  for(var i=0;i<len;i++)v.setInt16(hdrSz+i*2,Math.floor(buf[i]*32767),true);
  var bytes=new Uint8Array(ab),bin="";
  for(var i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
  return "data:audio/wav;base64,"+btoa(bin);
}
var _MELS={
  en_camino:  {n:[[440,0],[523,0.18],[440,0.34],[587,0.50],[440,0.66]],d:0.9},
  en_puerta:  {n:[[523,0],[659,0.14],[784,0.28],[659,0.42],[880,0.56]],d:0.8},
  entregado:  {n:[[523,0],[659,0.14],[784,0.26],[1047,0.38]],d:0.6},
  ausencia_hoy:{n:[[400,0],[330,0.20],[400,0.40]],d:0.6},
  cancelar_ausencia:{n:[[440,0],[523,0.14],[659,0.28]],d:0.5},
  confirm:    {n:[[880,0],[1100,0.1]],d:0.25}
};
(function(){Object.keys(_MELS).forEach(function(k){window._soundURIs[k]=_mkWav(_MELS[k].n,_MELS[k].d)})})();

function _desbloquearAudio(){
  if(window._audioOK)return true;
  try{
    Object.keys(window._soundURIs).forEach(function(k){
      var a=new Audio(window._soundURIs[k]);a.preload="auto";a.volume=0.001;
      /* Intentar play silencioso para desbloquear */
      var p=a.play();if(p&&p.then)p.then(function(){a.pause()}).catch(function(){});
      a.load();window._soundPool[k]=a;
    });
    var C=window.AudioContext||window.webkitAudioContext;
    if(C){
      window._audioCtx=new C();
      if(window._audioCtx.state==="suspended")window._audioCtx.resume();
      var b=window._audioCtx.createBuffer(1,1,22050),s=window._audioCtx.createBufferSource();
      s.buffer=b;s.connect(window._audioCtx.destination);s.start(0);
    }
    window._audioOK=true;return true;
  }catch(e){return false}
}

/* Auto-desbloquear en cualquier interacción */
function _autoUnlock(){
  if(window._audioOK)return;
  _desbloquearAudio();
  if(window._audioOK){
    document.removeEventListener("touchstart",_autoUnlock,true);
    document.removeEventListener("touchend",_autoUnlock,true);
    document.removeEventListener("click",_autoUnlock,true);
    document.removeEventListener("pointerdown",_autoUnlock,true);
  }
}
document.addEventListener("touchstart",_autoUnlock,{capture:true,passive:true});
document.addEventListener("touchend",_autoUnlock,{capture:true,passive:true});
document.addEventListener("click",_autoUnlock,{capture:true,passive:true});
document.addEventListener("pointerdown",_autoUnlock,{capture:true,passive:true});

/* AUTO-ACTIVAR a los 2 segundos simulando interacción programática */
setTimeout(function(){
  if(window._audioOK)return;
  /* Simular evento de click para desbloquear el contexto de audio */
  try{
    var evt=new MouseEvent("click",{bubbles:true,cancelable:true,view:window});
    document.body.dispatchEvent(evt);
  }catch(e){}
  /* Intentar directamente igual */
  _desbloquearAudio();
  /* También pedir permiso de notificaciones */
  _pedirPermisoNotif();
},2000);

/* Volver a intentar cada vez que el usuario toca la pantalla */
document.addEventListener("touchstart",function onFirstTouch(){
  _desbloquearAudio();
  _pedirPermisoNotif();
  document.removeEventListener("touchstart",onFirstTouch);
},{once:true,passive:true});

function playHorn(tipo){
  tipo=tipo||"en_camino";
  try{if(navigator.vibrate){
    var vib={en_puerta:[300,100,300,100,500],entregado:[150,80,150,80,400]};
    navigator.vibrate(vib[tipo]||[200,80,200]);
  }}catch(e){}
  var uri=window._soundURIs[tipo]||window._soundURIs.en_camino;
  /* 1. AudioContext primero (funciona tras unlock sin nuevo gesto) */
  if(window._audioCtx&&window._audioOK){
    try{
      var ctx=window._audioCtx;
      function tocar(){
        var mel=(_MELS[tipo]||_MELS.en_camino).n,now=ctx.currentTime;
        mel.forEach(function(n){
          var osc=ctx.createOscillator(),gn=ctx.createGain();
          osc.type="triangle";osc.frequency.value=n[0];
          gn.gain.setValueAtTime(0,now+n[1]);
          gn.gain.linearRampToValueAtTime(0.45,now+n[1]+0.02);
          gn.gain.setValueAtTime(0.45,now+n[1]+0.10);
          gn.gain.linearRampToValueAtTime(0,now+n[1]+0.17);
          osc.connect(gn);gn.connect(ctx.destination);
          osc.start(now+n[1]);osc.stop(now+n[1]+0.22);
        });
      }
      if(ctx.state==="suspended")ctx.resume().then(tocar);else tocar();
    }catch(e){}
  }
  /* 2. Pool pre-cargada como respaldo */
  var pa=window._soundPool[tipo];
  if(pa){try{pa.currentTime=0;pa.volume=0.9;var p2=pa.play();if(p2&&p2.catch)p2.catch(function(){})}catch(e){}}
  /* 3. new Audio() como último recurso */
  try{var a=new Audio(uri);a.volume=0.9;var p=a.play();if(p&&p.catch)p.catch(function(){})}catch(e){}
}

/* Banner de audio — se muestra si no está desbloqueado */
function AudioBanner(){
  var _vis=us(!window._audioOK),vis=_vis[0],sVis=_vis[1];
  ue(function(){
    if(window._audioOK){sVis(false);return;}
    var iv=setInterval(function(){if(window._audioOK)sVis(false);},500);
    return function(){clearInterval(iv);};
  },[]);
  if(!vis)return null;
  function activar(e){
    e&&e.preventDefault&&e.preventDefault();
    _desbloquearAudio();
    _pedirPermisoNotif();
    sVis(false);
    playHorn("confirm");
  }
  return h("div",{id:"audio-banner-el",
    onClick:activar,onTouchEnd:activar,
    className:"audio-banner"},
    h("span",{style:{fontSize:30,animation:"bellRing 0.7s ease infinite"}},"🔔"),
    h("div",{style:{flex:1}},
      h("div",{style:{fontSize:15,fontWeight:800,color:"#fff"}},"Toca aquí para activar alertas de sonido"),
      h("div",{style:{fontSize:11,color:"rgba(255,255,255,.85)",marginTop:2}},"Necesario para recibir avisos del furgón")),
    h("div",{style:{fontSize:11,fontWeight:700,color:"#fff",background:"rgba(255,255,255,.2)",borderRadius:8,padding:"6px 10px"}},"ACTIVAR"));
}

/* ═══════════════════════════════════════════════
   📲 NOTIFICACIONES — SW + Notification API
   ═══════════════════════════════════════════════ */
window._notifPermiso=false;
window._swReg=null;

function _pedirPermisoNotif(){
  if(!("Notification" in window))return;
  if(Notification.permission==="granted"){window._notifPermiso=true;return;}
  if(Notification.permission!=="denied"){
    Notification.requestPermission().then(function(p){
      if(p==="granted")window._notifPermiso=true;
    });
  }
}

function _enviarNotif(titulo,cuerpo,url){
  var targetUrl=url||window.location.href;
  var opts={body:cuerpo||"",icon:"/icon-192.jpg",badge:"/icon-192.jpg",
    tag:"ruta-"+Date.now(),renotify:true,requireInteraction:true,
    vibrate:[300,100,300,100,500],data:{url:targetUrl}};
  try{
    /* Método 1: SW postMessage (funciona background Android + iOS PWA instalada) */
    var reg=window._swReg;
    if(reg){
      var sw=reg.active||reg.waiting||reg.installing;
      if(sw){
        sw.postMessage({type:"SHOW_NOTIF",title:titulo,body:cuerpo,url:targetUrl});
        /* También intentar showNotification directo por si acaso */
        if(sw.state==="activated"){
          try{reg.showNotification(titulo,opts);}catch(e2){}
        }
        return;
      }
    }
    /* Método 2: serviceWorker.controller */
    if(navigator.serviceWorker&&navigator.serviceWorker.controller){
      navigator.serviceWorker.controller.postMessage(
        {type:"SHOW_NOTIF",title:titulo,body:cuerpo,url:targetUrl});
      return;
    }
    /* Método 3: serviceWorker.ready */
    if(navigator.serviceWorker){
      navigator.serviceWorker.ready.then(function(r){
        if(r.active)r.active.postMessage({type:"SHOW_NOTIF",title:titulo,body:cuerpo,url:targetUrl});
        r.showNotification(titulo,opts);
      }).catch(function(){});
      return;
    }
    /* Método 4: Notification directa (solo con app abierta) */
    if(Notification.permission==="granted"){
      var n=new Notification(titulo,opts);
      setTimeout(function(){n.close();},20000);
      n.onclick=function(){window.focus();n.close();};
    }
  }catch(e){}
}

function _mostrarNotifNativa(titulo,cuerpo,url){
  if(!("Notification" in window)){_enviarNotif(titulo,cuerpo,url);return;}
  if(Notification.permission==="granted"){_enviarNotif(titulo,cuerpo,url);return;}
  if(Notification.permission!=="denied"){
    Notification.requestPermission().then(function(p){
      if(p==="granted"){window._notifPermiso=true;_enviarNotif(titulo,cuerpo,url);}
    });
  }else{
    /* Sin permiso, igual intentar por SW (puede funcionar si SW tiene permiso previo) */
    _enviarNotif(titulo,cuerpo,url);
  }
}

/* ═══════════════════════════════════════════════

var _wtCode='var ts={};self.onmessage=function(e){var d=e.data;if(d.cmd==="start"){if(ts[d.id])clearInterval(ts[d.id]);ts[d.id]=setInterval(function(){self.postMessage({id:d.id})},d.ms)}if(d.cmd==="stop"){if(ts[d.id]){clearInterval(ts[d.id]);delete ts[d.id]}}};';

/* ═══════════════════════════════════════════════

function AlertPopup(p){
  var al=p.alert,onClose=p.onClose;
  if(!al)return null;

/* ═══════════════════════════════════════════════
   🗺️ MAPA GPS — v5 CORRECTO
   
   FIXES DEFINITIVOS:
   ✅ Ticker muestra "Hace Xs" DECREMENTANDO desde ahora
      Cuando llega nueva señal → resetea a "Hace 0s"
   ✅ Refresh usa ref → nunca closure stale
   ✅ RT detecta STOP: si pasan >20s sin señal → "Pausado"
   ✅ Realtime vía useData._gpsRT callback
   ✅ "lastSeen" es el timestamp de la BD, NO Date.now()
   
   LÓGICA DEL TIMER:
   - lastGpsTs = timestamp de cuando el furgón envió GPS
   - ticker calcula s = (Date.now() - lastGpsTs) / 1000
   - Si s es pequeño (0-5s) → furgón activo en vivo
   - Si s crece sin reset → furgón dejó de transmitir
   - El texto "Hace Xs" sube: así el apoderado sabe
     que hace X segundos fue la última señal
   - Cuando llega nueva señal, s vuelve a 0
   ═══════════════════════════════════════════════ */
var _pMap=null,_pMarker=null;

function ParentMap(p){
  var st=p.st;

  var _status=us("cargando"),status=_status[0],sStat=_status[1];
  var _segs=us(null),segs=_segs[0],sSegs=_segs[1];
  var _hora=us(null),hora=_hora[0],sHora=_hora[1]; /* hora de última señal */

  /* refs — sin closure stale */
  var tsRef=ur(null);       /* timestamp ms de la última señal GPS */
  var mapRef=ur(null);
  var markRef=ur(null);

  var vanRef=ur(van);

  function mkIcon(v){
    var c=v==="A"?"#f5c518":"#3b82f6";
    return L.divIcon({
      html:'<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 56 56">'
        +'<circle cx="28" cy="28" r="26" fill="'+c+'" stroke="#0a1628" stroke-width="3.5"/>'
        +'<text x="28" y="23" font-size="18" fill="#0a1628" text-anchor="middle">🚐</text>'
        +'<text x="28" y="42" font-size="16" font-weight="900" fill="#0a1628" text-anchor="middle">'+v+'</text>'
        +'</svg>',
      className:"",iconSize:[56,56],iconAnchor:[28,28]
    });
  }

  function moverMarcador(lat,lng){
    var m=mapRef.current;if(!m)return;
    if(markRef.current)markRef.current.setLatLng([lat,lng]);
    else markRef.current=L.marker([lat,lng],{icon:mkIcon(vanRef.current||"A")}).addTo(m);
    m.setView([lat,lng],16,{animate:true,duration:0.6});
  }

  /* Procesar datos de GPS (desde BD o RT) */
  function procesarGPS(lat,lng,ultimaAct){
    var ts=new Date(ultimaAct).getTime();
    tsRef.current=ts;
    var hace=Date.now()-ts;
    moverMarcador(lat,lng);
    sHora(new Date(ts).toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit",second:"2-digit"}));
    if(hace<180000)sStat("activo");
    else if(hace<600000)sStat("reciente");
    else sStat("esperando");
  }

  /* Consultar BD */
  function cargarPosicion(){
    var v=vanRef.current;if(!v)return;
    sb.from("ubicaciones_furgones").select("*").eq("furgon_id",v).limit(1)
      .then(function(r){
        if(r.error||!r.data||r.data.length===0){sStat("sindata");return;}
        procesarGPS(r.data[0].latitud,r.data[0].longitud,r.data[0].ultima_actualizacion);
      }).catch(function(){sStat("sindata");});
  }
  /* Actualizar ref SIEMPRE para evitar closure stale en botón */
  carRef.current=cargarPosicion;

  /* ── TICKER ── */
  /* Recalcula segundos cada 1s. s = tiempo desde última señal.
     Cuando llega nueva señal vía RT o polling, tsRef.current se actualiza

    window._onVisibleCbs.push(onVis);

    return function(){
      window._gpsRT=null;
      wClr(poll);
      window._onVisibleCbs=window._onVisibleCbs.filter(function(f){return f!==onVis;});
      if(mapRef.current){mapRef.current.remove();mapRef.current=null;markRef.current=null;}

  },[van]);

  if(!van)return null;

  var vanClr=van==="A"?"var(--yw)":"var(--bl)";
  var stClr={activo:"var(--gn)",reciente:vanClr,esperando:"var(--gy)",sindata:"var(--gy)",cargando:"var(--gy)"}[status]||"var(--gy)";

  var timerTxt=(function(){

  return h("div",{style:{marginBottom:14}},
    h("div",{className:"lbl",style:{marginBottom:6}},"📍 UBICACIÓN FURGÓN "+van),

      h("button",{

          cursor:"pointer",minHeight:42,display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}},
        "🔄 Actualizar")));

function CodeEntryScreen(p){

      h("input",{className:"i",type:"text",placeholder:"Ej: ABC123",

  function F(m,t){sT({m:m,t:t||"ok",s:true});setTimeout(function(){sT(function(x){return{m:x.m,t:x.t,s:false};});},3000);}

/* ═══════════════════════════════════════════════
   🔔 SERVICE WORKER — notificaciones nativas
   Usa sw.js externo (requerido por iOS PWA)
   ═══════════════════════════════════════════════ */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/sw.js",{scope:"/"})
    .then(function(reg){
      window._swReg=reg;
      /* Escuchar cuando SW se activa */
      function onSWReady(sw){
        if(!sw)return;
        if(sw.state==="activated"){window._swActive=sw;return;}
        sw.addEventListener("statechange",function(){
          if(sw.state==="activated")window._swActive=sw;
        });
      }
      onSWReady(reg.active||reg.installing||reg.waiting);
      reg.addEventListener("updatefound",function(){onSWReady(reg.installing);});
      /* Mensaje del SW a la app */
      navigator.serviceWorker.addEventListener("message",function(e){
        if(e.data&&e.data.type==="NOTIFICATION_CLICK"){
          if(typeof window._onVisible==="function")window._onVisible();
        }
      });
    })
    .catch(function(err){console.warn("SW no disponible:",err);});
}
