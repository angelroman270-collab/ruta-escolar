function _mkWav(notas,durSec){
  var sr=22050,len=Math.ceil(sr*(durSec||0.9)),buf=new Float32Array(len);
  notas.forEach(function(n){
    var freq=n[0],startS=Math.floor(n[1]*sr),dur=Math.floor(0.17*sr);
    for(var i=0;i<dur&&(startS+i)<len;i++){
      var t=i/sr;
      var env=i<dur*0.08?i/(dur*0.08):i>dur*0.65?1-(i-dur*0.65)/(dur*0.35):1;
      buf[startS+i]+=Math.sin(2*Math.PI*freq*t)*0.45*env;
    }
  });
  for(var i=0;i<len;i++){buf[i]=Math.max(-1,Math.min(1,buf[i]))}
  var hdrSz=44,dataSz=len*2,wavSz=hdrSz+dataSz;
  var ab=new ArrayBuffer(wavSz),v=new DataView(ab);
  function ws(o,s){for(var j=0;j<s.length;j++)v.setUint8(o+j,s.charCodeAt(j))}
  ws(0,"RIFF");v.setUint32(4,wavSz-8,true);ws(8,"WAVE");ws(12,"fmt ");
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);
  v.setUint16(34,16,true);ws(36,"data");v.setUint32(40,dataSz,true);
  for(var i=0;i<len;i++){v.setInt16(hdrSz+i*2,Math.floor(buf[i]*32767),true)}
  var bytes=new Uint8Array(ab),bin="";
  for(var i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
  return "data:audio/wav;base64,"+btoa(bin);
}

function _desbloquearAudio(){
  if(window._audioOK)return true;
  try{
    Object.keys(window._soundURIs).forEach(function(k){
      var a=new Audio(window._soundURIs[k]);a.preload="auto";a.volume=0.8;a.load();
      window._soundPool[k]=a;
    });
    try{
      var C=window.AudioContext||window.webkitAudioContext;
      if(C){window._audioCtx=new C();if(window._audioCtx.state==="suspended")window._audioCtx.resume();
        var b=window._audioCtx.createBuffer(1,1,22050),s=window._audioCtx.createBufferSource();
        s.buffer=b;s.connect(window._audioCtx.destination);s.start(0);}
    }catch(e2){}
    window._audioOK=true;return true;
  }catch(e){return false}
}

  if(window._audioOK){
    document.removeEventListener("touchstart",_autoUnlock,true);

function playHorn(tipo){
  tipo=tipo||"en_camino";
  try{if(navigator.vibrate){
    if(tipo==="en_puerta")navigator.vibrate([300,100,300,100,500]);
    else if(tipo==="entregado")navigator.vibrate([150,80,150,80,400]);
    else navigator.vibrate([200,80,200]);
  }}catch(e){}
  var uri=window._soundURIs[tipo]||window._soundURIs.en_camino;
  try{var a=new Audio(uri);a.volume=0.85;var p=a.play();if(p&&p.catch)p.catch(function(){})}catch(e){}
  if(window._soundPool[tipo]){
    try{var poolA=window._soundPool[tipo];poolA.currentTime=0;poolA.volume=0.85;
      var p2=poolA.play();if(p2&&p2.catch)p2.catch(function(){})}catch(e){}
  }
  if(window._audioCtx&&window._audioOK){
    try{
      var ctx=window._audioCtx;if(ctx.state==="suspended")ctx.resume();
      var mel=(_MELS[tipo]||_MELS.en_camino).n,now=ctx.currentTime;
      mel.forEach(function(n){
        var osc=ctx.createOscillator(),gn=ctx.createGain();
        osc.type="triangle";osc.frequency.value=n[0];
        gn.gain.setValueAtTime(0,now+n[1]);gn.gain.linearRampToValueAtTime(0.35,now+n[1]+0.02);
        gn.gain.setValueAtTime(0.35,now+n[1]+0.10);gn.gain.linearRampToValueAtTime(0,now+n[1]+0.16);
        osc.connect(gn);gn.connect(ctx.destination);osc.start(now+n[1]);osc.stop(now+n[1]+0.20);
      });
    }catch(e){}
  }
}

window._notifPermiso=false;

function _pedirPermisoNotif(){
  if(!("Notification" in window))return;
  if(Notification.permission==="granted"){window._notifPermiso=true;return}
  if(Notification.permission!=="denied"){
    Notification.requestPermission().then(function(p){if(p==="granted")window._notifPermiso=true});
  }
}

function _mostrarNotifNativa(titulo,cuerpo,url){
  if(!("Notification" in window))return;
  var targetUrl=url||window.location.href;
  if(Notification.permission==="granted"){
    _enviarNotif(titulo,cuerpo,targetUrl);
  }else if(Notification.permission!=="denied"){
    Notification.requestPermission().then(function(p){
      if(p==="granted"){window._notifPermiso=true;_enviarNotif(titulo,cuerpo,targetUrl)}
    });
  }
}

function _enviarNotif(titulo,cuerpo,url){
  try{
    var targetUrl=url||window.location.href;
    /* Método 1: postMessage al SW activo (mejor para segundo plano) */
    if(window._swReg&&window._swReg.active){
      window._swReg.active.postMessage({type:"SHOW_NOTIF",title:titulo,body:cuerpo,url:targetUrl});
      return;
    }
    /* Método 2: SW ready showNotification */
    if(navigator.serviceWorker&&navigator.serviceWorker.controller){
      navigator.serviceWorker.ready.then(function(reg){
        reg.showNotification(titulo,{
          body:cuerpo,icon:"/icon-192.jpg",badge:"/icon-192.jpg",
          tag:"ruta-"+Date.now(),renotify:true,requireInteraction:true,
          vibrate:[300,100,300,100,500],data:{url:targetUrl}
        });
      }).catch(function(){
        var n=new Notification(titulo,{body:cuerpo,tag:"ruta-"+Date.now()});
        setTimeout(function(){n.close()},15000);
      });
    }else{
      var n=new Notification(titulo,{body:cuerpo,tag:"ruta-"+Date.now(),requireInteraction:true});
      setTimeout(function(){n.close()},15000);
      n.onclick=function(){window.focus();n.close()};
    }
  }catch(e){}
}

var _workerTimerCode='var ts={};self.onmessage=function(e){var d=e.data;if(d.cmd==="start"){if(ts[d.id])clearInterval(ts[d.id]);ts[d.id]=setInterval(function(){self.postMessage({id:d.id})},d.ms)}if(d.cmd==="stop"){if(ts[d.id])clearInterval(ts[d.id]);delete ts[d.id]}};';

  _workerTimer.onmessage=function(e){var cb=_workerCallbacks[e.data.id];if(cb)try{cb()}catch(err){}};
}catch(e){}
function wSetInterval(fn,ms){
  var id=++_workerIdCounter;
  if(_workerTimer){_workerCallbacks[id]=fn;_workerTimer.postMessage({cmd:"start",id:id,ms:ms});}
  else{var nid=setInterval(fn,ms);_workerCallbacks[id]={native:nid}}
  return id;
}

  if(_workerTimer){_workerTimer.postMessage({cmd:"stop",id:id});delete _workerCallbacks[id];}
  else{var ref=_workerCallbacks[id];if(ref&&ref.native)clearInterval(ref.native);delete _workerCallbacks[id]}

/* ══════════════════════════════════════════════
   📊 DATA HOOK — solo datos del apoderado
   ══════════════════════════════════════════════ */
function useData(){
  var _sc=us([]),sc=_sc[0],sSc=_sc[1];
  var _st=us([]),sts=_st[0],sSts=_st[1];
  var _ds=us([]),ds=_ds[0],sDs=_ds[1];
  var _nf=us([]),nf=_nf[0],sNf=_nf[1];
  var _sa=us([]),sa=_sa[0],sSa=_sa[1];
  var _py=us([]),py=_py[0],sPy=_py[1];
  var _ld=us(true),ld=_ld[0],sLd=_ld[1];
  var _er=us(null),er=_er[0],sEr=_er[1];
  function rl(){
    sb.from("schools").select("*").order("id").then(function(r){if(r.data&&!r.error)sSc(r.data)});
    sb.from("students").select("*").order("name").then(function(r){if(r.data&&!r.error)sSts(r.data)});
    sb.from("daily_state").select("*").eq("route_date",td()).then(function(r){if(r.data&&!r.error)sDs(r.data)});
    sb.from("notifications").select("*").order("created_at",{ascending:false}).limit(50).then(function(r){if(r.data&&!r.error)sNf(r.data)});
    sb.from("scheduled_absences").select("*").gte("absence_date",td()).then(function(r){if(r.data&&!r.error)sSa(r.data)});
    sb.from("payments").select("*").eq("year",new Date().getFullYear()).then(function(r){if(r.data&&!r.error)sPy(r.data)});
  }
  ue(function(){
    var live=true;
    Promise.all([
      sb.from("schools").select("*").order("id"),
      sb.from("students").select("*").order("name"),
      sb.from("daily_state").select("*").eq("route_date",td()),
      sb.from("notifications").select("*").order("created_at",{ascending:false}).limit(50),
      sb.from("scheduled_absences").select("*").gte("absence_date",td()),
      sb.from("payments").select("*").eq("year",new Date().getFullYear())
    ]).then(function(r){
      if(!live)return;
      var e=r.find(function(x){return x.error});
      if(e){sEr(e.error.message||"Error BD");sLd(false);return}
      sSc(r[0].data||[]);sSts(r[1].data||[]);sDs(r[2].data||[]);
      sNf(r[3].data||[]);sSa(r[4].data||[]);sPy(r[5].data||[]);
      sLd(false);
    }).catch(function(e){if(live){sEr(e.message);sLd(false)}});

    var ch=sb.channel("rt-portal")
      .on("postgres_changes",{event:"*",schema:"public",table:"notifications"},function(p){
        if(p.eventType==="INSERT"){
          sNf(function(prev){return[p.new].concat(prev)});
          /* Disparar alerta si tenemos handler registrado */
          if(typeof window._showAlert==="function")window._showAlert(p.new);
        }
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"daily_state"},function(p){
        sDs(function(prev){
          if(p.eventType==="INSERT")return prev.concat([p.new]);
          if(p.eventType==="UPDATE")return prev.map(function(r){return r.id===p.new.id?p.new:r});
          if(p.eventType==="DELETE")return prev.filter(function(r){return r.id!==p.old.id});
          return prev;
        });
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"scheduled_absences"},function(p){
        sSa(function(prev){
          if(p.eventType==="INSERT")return prev.concat([p.new]);
          if(p.eventType==="DELETE")return prev.filter(function(r){return r.id!==p.old.id});
          return prev;
        });
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"ubicaciones_furgones"},function(p){
        if((p.eventType==="INSERT"||p.eventType==="UPDATE")&&typeof window._gpsActualizarParent==="function"){
          window._gpsActualizarParent(p.new.furgon_id,p.new.latitud,p.new.longitud);
        }
      })
      .subscribe();

    /* Polling 10s + visibilidad */
    var poll=wSetInterval(function(){if(live)rl()},10000);
    function onVis(){if(live)rl()}
    window._onVisibleCbs.push(onVis);
    return function(){
      live=false;wClearInterval(poll);sb.removeChannel(ch);
      window._onVisibleCbs=window._onVisibleCbs.filter(function(f){return f!==onVis});
    };
  },[]);
  return{sc:sc,sts:sts,ds:ds,nf:nf,sa:sa,py:py,ld:ld,er:er,rl:rl};
}

/* ══════════════════════════════════════════════
   🗺️ MAPA GPS DEL APODERADO
   ══════════════════════════════════════════════ */
var _parentMap=null,_parentMarker=null;
/* ══════════════════════════════════════════════
   🗺️ MAPA GPS DEL APODERADO v4
   FIXES:
   ✅ Ticker cuenta hacia ATRÁS (tiempo desde GPS)
   ✅ Refresh funciona siempre (ref, no closure stale)
   ✅ Detecta pausa del furgón (>20s sin señal → "detenido")
   ✅ Realtime Supabase + polling 5s
   ✅ Estado "En camino" se limpia al detener ruta
   ══════════════════════════════════════════════ */
var _parentMap=null,_parentMarker=null;

function ParentMap(p){
  var st=p.st;
  var myVan=st&&st.van_a?"A":st&&st.van_b?"B":null;

  /* Estado reactivo */
  var _status=us("loading"),status=_status[0],setStatus=_status[1];
  var _segs=us(null),segs=_segs[0],setSegs=_segs[1];

  /* Refs — accesibles sin closure stale */
  var lastTsRef=ur(null);    /* ms UTC de la última coordenada GPS recibida */
  var mapRef=ur(null);       /* instancia Leaflet */
  var markerRef=ur(null);    /* marcador Leaflet */
  var cargarRef=ur(null);    /* puntero a cargarPosicion() */
  var myVanRef=ur(myVan);
  myVanRef.current=myVan;

  /* ── Icono del furgón ── */
  function mkIcon(van){
    var c=van==="A"?"#f5c518":"#3b82f6";
    return L.divIcon({
      html:'<svg xmlns="http://www.w3.org/2000/svg" width="54" height="54" viewBox="0 0 54 54">'
        +'<circle cx="27" cy="27" r="25" fill="'+c+'" stroke="#0a1628" stroke-width="3"/>'
        +'<text x="27" y="22" font-size="17" fill="#0a1628" text-anchor="middle">🚐</text>'
        +'<text x="27" y="40" font-size="15" font-weight="900" fill="#0a1628" text-anchor="middle">'+van+'</text>'
        +'</svg>',
      className:"",iconSize:[54,54],iconAnchor:[27,27]
    });
  }

  /* ── Mover marcador en mapa ── */
  function moverMarcador(lat,lng){
    var m=mapRef.current,mk=markerRef.current,van=myVanRef.current||"A";
    if(!m)return;
    if(mk){mk.setLatLng([lat,lng]);}
    else{markerRef.current=L.marker([lat,lng],{icon:mkIcon(van)}).addTo(m)}
    m.setView([lat,lng],15,{animate:true,duration:0.7});
  }

  /* ── Procesar fila de BD ── */
  function procesarFila(row){
    var ts=new Date(row.ultima_actualizacion).getTime();
    lastTsRef.current=ts;
    var hace=Date.now()-ts;
    moverMarcador(row.latitud,row.longitud);
    if(hace<180000){setStatus("active");}        /* <3min = activo */
    else if(hace<600000){setStatus("recent");}   /* 3-10min = reciente */
    else{setStatus("waiting");}                  /* >10min = sin ruta */
  }

  /* ── Cargar posición desde BD ── */
  function cargarPosicion(){
    var van=myVanRef.current;
    if(!van)return;
    sb.from("ubicaciones_furgones").select("*").eq("furgon_id",van).limit(1)
      .then(function(r){
        if(r.error||!r.data||r.data.length===0){setStatus("nodata");return;}
        procesarFila(r.data[0]);
      })
      .catch(function(){setStatus("nodata");});
  }
  cargarRef.current=cargarPosicion;

  /* ── Ticker: recalcula "hace Xs" cada segundo SIN llamar a BD ── */
  ue(function(){
    var iv=setInterval(function(){
      var ts=lastTsRef.current;
      if(ts===null){setSegs(null);return;}
      var s=Math.round((Date.now()-ts)/1000);
      setSegs(s);
      /* Degradar estado si el furgón dejó de transmitir */
      setStatus(function(prev){
        if(prev==="active"&&s>25)return"recent";
        if(prev!=="waiting"&&s>600)return"waiting";
        return prev;
      });
    },1000);
    return function(){clearInterval(iv);};
  },[]);

  /* ── Inicializar mapa + suscripciones ── */
  ue(function(){
    if(!myVan)return;

    /* Callback RT global (lo llama useData cuando llega evento Supabase) */
    window._gpsActualizarParent=function(furgon,lat,lng){
      if(furgon!==myVanRef.current)return;
      lastTsRef.current=Date.now();
      moverMarcador(lat,lng);
      setStatus("active");
    };

    /* Inicializar mapa Leaflet */
    setTimeout(function(){
      var el=document.getElementById("pmap");
      if(!el)return;
      if(mapRef.current){mapRef.current.invalidateSize();cargarPosicion();return;}
      var m=L.map("pmap",{zoomControl:true,attributionControl:false,dragging:true,touchZoom:true})
        .setView([-33.4489,-70.6693],13);
      L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{maxZoom:19}).addTo(m);
      mapRef.current=m;
      setTimeout(function(){m.invalidateSize();cargarPosicion();},500);
    },200);

    /* Polling 5s via Worker timer (no se congela en background) */
    var poll=wSetInterval(function(){cargarRef.current&&cargarRef.current();},5000);
    function onVis(){cargarRef.current&&cargarRef.current();}
    window._onVisibleCbs.push(onVis);

    return function(){
      window._gpsActualizarParent=null;
      wClearInterval(poll);
      window._onVisibleCbs=window._onVisibleCbs.filter(function(f){return f!==onVis;});
      if(mapRef.current){mapRef.current.remove();mapRef.current=null;markerRef.current=null;}
    };
  },[myVan]);

  if(!myVan)return null;

  /* Colores por estado */
  var vanColor=myVan==="A"?"var(--yw)":"var(--bl)";
  var stColor={active:"var(--gn)",recent:vanColor,waiting:"var(--gy)",nodata:"var(--gy)",loading:"var(--gy)"}[status]||"var(--gy)";

  /* Texto del timer — cuenta HACIA ATRÁS desde la última señal */
  var timerTxt=(function(){
    if(segs===null||status==="loading")return"Conectando al GPS...";
    if(status==="waiting")return"Furgón sin ruta activa";
    if(status==="nodata")return"Sin datos GPS aún";
    if(segs<3)return"🟢 En vivo ahora";
    if(segs<60)return"Hace "+segs+" segundos";
    var m=Math.floor(segs/60),s=segs%60;
    if(m<10)return"Hace "+m+"m "+s+"s"+(status==="recent"?" · Posible pausa":"");
    return"Hace "+m+" min · Furgón detenido";
  })();

  var pillTxt={active:"🟢 En movimiento",recent:"📍 Pausado / Cerca",waiting:"⏳ Sin ruta activa",nodata:"📡 Sin señal",loading:"📡 Conectando..."}[status]||"📡";

  return h("div",{style:{marginBottom:12}},
    h("div",{className:"lbl",style:{marginBottom:6}},"📍 UBICACIÓN FURGÓN "+myVan),
    h("div",{style:{borderRadius:14,overflow:"hidden",border:"2px solid "+stColor,position:"relative"}},
      h("div",{id:"pmap",style:{width:"100%",height:220}}),
      h("div",{style:{position:"absolute",top:8,left:"50%",transform:"translateX(-50%)",zIndex:1000,pointerEvents:"none"}},
        h("div",{className:"gps-status-pill "+(status==="active"?"moving":status==="recent"?"on":"")},pillTxt))),
    h("div",{style:{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",
        background:"var(--cd)",border:"1px solid var(--bd)",borderTop:"none",borderRadius:"0 0 14px 14px"}},
      h("div",{style:{flex:1}},
        h("div",{style:{fontSize:12,fontWeight:700,color:stColor}},timerTxt),
        lastTsRef.current&&status!=="waiting"&&status!=="nodata"&&
          h("div",{style:{fontSize:9,color:"var(--gy)",marginTop:2}},
            "Señal: "+new Date(lastTsRef.current).toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit",second:"2-digit"}))),
      status==="active"&&h("span",{className:"dot-live"}),
      h("button",{
        /* CLAVE: usa cargarRef.current para evitar closure stale */
        onClick:function(e){e.stopPropagation();if(cargarRef.current)cargarRef.current();},
        style:{flexShrink:0,background:stColor,color:"var(--ny)",border:"none",
          borderRadius:10,padding:"10px 16px",fontSize:12,fontWeight:800,cursor:"pointer",minHeight:40,
          display:"flex",alignItems:"center",gap:6}},
        "🔄 Ahora")));
}

      /* Solo notificaciones del transportista para ESTE alumno */
      if(nf.from_role==="driver"&&nf.student_id===st.id){
        playHorn(nf.ntype);
        sPAL(nf);
        var txt=_notifTexto(nf);

        .select("*").eq("student_id",st.id).eq("from_role","driver")
        .order("created_at",{ascending:false}).limit(1)

            sPAL(newest);
            var txt=_notifTexto(newest);
            _mostrarNotifNativa(txt.t,txt.b,window.location.href);
          }
          _lastNfId.current=newest.id;
        });

    window._onVisibleCbs.push(onVis);

      window._showAlert=null;wClearInterval(poll);

        h(I,{name:"bell",size:14,color:"var(--yw)"}),"Activar")),

    /* Cuerpo */
    h("main",{className:"scr",style:{flex:1,minHeight:0,padding:"12px",
      paddingBottom:"calc(32px + env(safe-area-inset-bottom,0px))"}},

      /* Tarjeta alumno */
      h("div",{style:{background:"linear-gradient(135deg,var(--n2),var(--n3))",borderRadius:16,

        h("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:12}},
          h("div",{style:{width:48,height:48,borderRadius:12,background:"linear-gradient(135deg,var(--pp),#7c3aed)",

/* ══════════════════════════════════════════════
   🔔 SERVICE WORKER — notificaciones nativas
   FIXES:
   ✅ Usa sw.js externo (iOS PWA lo exige)
   ✅ Espera a que el SW esté "activated"
   ✅ Reintenta postMessage hasta 3 veces
   ✅ Fallback: Notification directa si SW falla
   ══════════════════════════════════════════════ */
window._swReg=null;

function _enviarPorSW(titulo,cuerpo,url){
  var targetUrl=url||window.location.href;
  var msg={type:"SHOW_NOTIF",title:titulo,body:cuerpo,url:targetUrl};

  /* Método A: SW activo via postMessage */
  var reg=window._swReg;
  if(reg){
    var sw=reg.active||reg.waiting||reg.installing;
    if(sw&&sw.state==="activated"){sw.postMessage(msg);return true;}
    if(sw){
      /* Esperar a que se active */
      sw.addEventListener("statechange",function h(){
        if(sw.state==="activated"){sw.removeEventListener("statechange",h);sw.postMessage(msg);}
      });
      return true;
    }
  }

  /* Método B: navigator.serviceWorker.controller */
  if(navigator.serviceWorker&&navigator.serviceWorker.controller){
    navigator.serviceWorker.controller.postMessage(msg);
    return true;
  }

  /* Método C: serviceWorker.ready */
  if(navigator.serviceWorker){
    navigator.serviceWorker.ready.then(function(r){
      if(r.active)r.active.postMessage(msg);
      else r.showNotification(titulo,{body:cuerpo,icon:"/icon-192.jpg",badge:"/icon-192.jpg",
        tag:"ruta-"+Date.now(),renotify:true,requireInteraction:true,
        vibrate:[300,100,300],data:{url:targetUrl}});
    }).catch(function(){});
    return true;
  }
  return false;
}

/* Sobrescribir _enviarNotif con versión mejorada */
function _enviarNotif(titulo,cuerpo,url){
  try{
    /* Intentar vía SW primero (funciona en background Android + iOS PWA) */
    var ok=_enviarPorSW(titulo,cuerpo,url||window.location.href);
    if(!ok){
      /* Fallback: Notification directa (solo funciona con app abierta) */
      if(Notification.permission==="granted"){
        var n=new Notification(titulo,{body:cuerpo||"",icon:"/icon-192.jpg",
          tag:"ruta-"+Date.now(),renotify:true,requireInteraction:true});
        setTimeout(function(){n.close();},20000);
        n.onclick=function(){window.focus();n.close();};
      }
    }
  }catch(e){}
}

if("serviceWorker" in navigator){
  /* IMPORTANTE: sw.js debe estar en la raíz del servidor
     iOS Safari solo acepta SW de archivos reales (no blob URLs) */
  navigator.serviceWorker.register("/sw.js",{scope:"/"})
    .then(function(reg){
      window._swReg=reg;
      /* Escuchar mensajes del SW → app */
      navigator.serviceWorker.addEventListener("message",function(e){
        if(e.data&&e.data.type==="NOTIFICATION_CLICK"){
          if(typeof window._onVisible==="function")window._onVisible();
        }
      });
    })
    .catch(function(err){
      console.warn("SW no registrado:",err);
    });
}
